# /etc/nginx/sites-available/shiftswift
# Install: sudo cp deploy/nginx-shiftswift.conf /etc/nginx/sites-available/shiftswift

map $host $shiftswift_frontend_root {
  default /opt/shiftswifthr/frontend;
}

server {
  listen 80;
  listen [::]:80;
  server_name shiftswifthr.co.uk;
  return 301 https://www.shiftswifthr.co.uk$request_uri;
}

server {
  listen 80;
  listen [::]:80;
  server_name www.shiftswifthr.co.uk app.shiftswifthr.co.uk;

  root /opt/shiftswifthr/frontend;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(css|js|svg|png|jpg|webp|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, immutable";
  }
}

server {
  listen 80;
  listen [::]:80;
  server_name api.shiftswifthr.co.uk;

  client_max_body_size 12m;

  location / {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# After certbot --nginx, HTTPS blocks are added automatically.
