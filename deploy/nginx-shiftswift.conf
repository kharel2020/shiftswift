# /etc/nginx/sites-available/shiftswift
# Install: sudo cp deploy/nginx-shiftswift.conf /etc/nginx/sites-available/shiftswift

map $host $shiftswift_frontend_root {
  default /opt/shiftswifthr/frontend;
}

# Apex → marketing www
server {
  listen 80;
  listen [::]:80;
  server_name shiftswifthr.co.uk;
  return 301 https://www.shiftswifthr.co.uk$request_uri;
}

# Marketing site — legal pages and homepage only; HR app lives on app.*
server {
  listen 80;
  listen [::]:80;
  server_name www.shiftswifthr.co.uk;

  root /opt/shiftswifthr/frontend;
  index index.html;

  # HR / employee app URLs → app subdomain (same path)
  location ~* ^/(business-login|admin|employee|signup|signup-success|punch|punch-kiosk|punch-site-card|punch-site-poster|ops-9x7k2|master|forgot-password|reset-password|setup|login|sign-contract|tenant-login|master-login)(\.html)?/?$ {
    return 301 https://app.shiftswifthr.co.uk$request_uri;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(css|js|svg|png|jpg|webp|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, immutable";
  }
}

# HR app — login, admin, employee portal, OPS
server {
  listen 80;
  listen [::]:80;
  server_name app.shiftswifthr.co.uk;

  root /opt/shiftswifthr/frontend;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(css|js|svg|png|jpg|webp|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, immutable";
  }
}

server {
  listen 80;
  listen [::]:80;
  server_name api.shiftswifthr.co.uk;

  client_max_body_size 12m;

  location / {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# After certbot --nginx, HTTPS blocks are added automatically.
# Re-apply the www → app redirect inside the www HTTPS server block if certbot creates separate blocks.
