<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShiftSwift HR | Choose new password</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon.png?v=brandkit-v1" />
    <link rel="stylesheet" href="./styles.css?v=brandkit-v4" />
  </head>
  <body class="portal-login-page">
    <div class="portal-login-shell">
      <header class="portal-login-brand">
        <a href="./business-login.html">
          <img class="portal-login-brand-logo" src="./assets/shiftswift-hr-logo-nav.svg?v=brandkit-v4" alt="ShiftSwift HR" />
        </a>
        <p class="portal-login-brand-copy">Set a new password</p>
      </header>

      <section class="portal-login-card">
        <div class="portal-login-card-body">
          <div class="portal-login-card-head">
            <h1>Choose a new password</h1>
            <p class="portal-login-card-lead">Use at least 8 characters.</p>
          </div>

          <form id="reset-password-form" class="portal-login-form">
            <label>
              New password
              <input name="new_password" type="password" required minlength="8" autocomplete="new-password" />
            </label>
            <label>
              Confirm password
              <input name="confirm_password" type="password" required minlength="8" autocomplete="new-password" />
            </label>
            <p id="reset-status" class="form-error-message" hidden></p>
            <button class="btn portal-login-submit" type="submit">Update password</button>
          </form>

          <p class="portal-login-alt-note">
            Link expired?
            <a class="portal-login-inline-link" href="./forgot-password.html">Request a new reset link</a>
          </p>
        </div>
      </section>
    </div>
    <script src="./brand-config.js?v=brand-v5"></script>
    <script src="./password-reset.js?v=2"></script>
      <script src="./cookie-consent.js?v=1"></script>
  </body>
</html>
