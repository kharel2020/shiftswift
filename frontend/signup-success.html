<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="./brand-config.js?v=brand-v5"></script>
    <script src="./app-host-guard.js?v=1"></script>
    <title>ShiftSwift HR | Welcome</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon.png?v=brandkit-v1" />
    <link rel="stylesheet" href="./styles.css?v=brandkit-v1" />
  </head>
  <body class="auth-body">
    <div class="auth-card" style="max-width: 520px; text-align: center;">
      <a class="brand" href="./index.html" style="justify-content: center;">
        <img class="brand-logo" src="./assets/shiftswift-hr-logo-nav.svg?v=brandkit-v4" alt="ShiftSwift HR" />
      </a>
      <h1>You're all set</h1>
      <p class="muted" id="success-message">Your workspace is ready. Check your inbox for welcome details, a getting-started guide (HR admin, employee portal &amp; time clock), and your agreement to sign.</p>
      <div class="hero-actions" style="justify-content: center; margin-top: 20px;">
        <a class="btn" href="./admin.html">Open admin console</a>
        <a class="btn ghost" href="https://app.shiftswifthr.co.uk/business-login.html">Sign in later</a>
      </div>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const tenant = params.get("tenant");
      const plan = params.get("plan");
      const msg = document.getElementById("success-message");
      if (msg && tenant) {
        msg.textContent = `Workspace #${tenant} is ready${plan ? ` on plan ${plan.replace(/_/g, " ")}` : ""}. Your trial has started.`;
      }
    </script>
      <script src="./cookie-consent.js?v=1"></script>
  </body>
</html>
