<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShiftSwift HR | Reset password</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon.png?v=brandkit-v1" />
    <link rel="stylesheet" href="./styles.css?v=brandkit-v4" />
  </head>
  <body class="portal-login-page">
    <div class="portal-login-shell">
      <header class="portal-login-brand">
        <a href="./business-login.html">
          <img class="portal-login-brand-logo" src="./assets/shiftswift-hr-logo-nav.svg?v=brandkit-v4" alt="ShiftSwift HR" />
        </a>
        <p class="portal-login-brand-copy">Password reset</p>
      </header>

      <section class="portal-login-card">
        <div class="portal-login-role-tabs" id="reset-tabs" role="tablist" aria-label="Account type">
          <button type="button" role="tab" aria-selected="true" class="portal-login-role-tab is-active" data-reset-tab="hr">
            <span class="portal-login-role-tab-label">Business HR</span>
          </button>
          <button type="button" role="tab" aria-selected="false" class="portal-login-role-tab" data-reset-tab="employee">
            <span class="portal-login-role-tab-label">Employee</span>
          </button>
        </div>

        <div class="portal-login-card-body">
          <div class="portal-login-card-head">
            <h1>Forgot password?</h1>
            <p class="portal-login-card-lead">
              Enter your account email and we will send a secure reset link (valid for 24 hours).
            </p>
          </div>

          <form id="forgot-password-form" class="portal-login-form">
            <label>
              Email
              <input name="email" type="email" required autocomplete="username" placeholder="you@company.co.uk" />
            </label>
            <p id="forgot-status" class="form-error-message" hidden></p>
            <button class="btn portal-login-submit" type="submit">Send reset link</button>
          </form>

          <p class="portal-login-alt-note">
            Remembered it?
            <a class="portal-login-inline-link" href="./business-login.html">Back to sign in</a>
          </p>
        </div>
      </section>
    </div>
    <script src="./brand-config.js?v=brand-v5"></script>
    <script src="./password-reset.js?v=2"></script>
  </body>
</html>
